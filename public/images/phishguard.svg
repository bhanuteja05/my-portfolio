<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a0520"/>
    </linearGradient>
    <linearGradient id="danger" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4444"/>
      <stop offset="100%" style="stop-color:#ff8800"/>
    </linearGradient>
    <linearGradient id="safe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#00ccff"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg2)" rx="16"/>
  <!-- Scan lines -->
  <g opacity="0.04" stroke="#ff4444" stroke-width="0.5">
    <line x1="0" y1="50" x2="800" y2="50"/><line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/><line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
  </g>
  <!-- Card layout -->
  <rect x="50" y="40" width="700" height="420" rx="16" fill="#0d0d1f" stroke="#2a1a3a" stroke-width="1.5"/>
  <!-- Header -->
  <text x="400" y="85" fill="#fff" font-family="monospace" font-size="22" text-anchor="middle" font-weight="bold" filter="url(#glow2)">🛡️ PhishGuard AI</text>
  <text x="400" y="108" fill="#888" font-family="monospace" font-size="12" text-anchor="middle">AI-Powered Phishing Detection System</text>
  <!-- URL Analysis Card -->
  <rect x="80" y="130" width="640" height="50" rx="8" fill="#151525" stroke="#2a2a4a" stroke-width="1"/>
  <text x="100" y="160" fill="#666" font-family="monospace" font-size="12">URL:</text>
  <text x="140" y="160" fill="#ff8800" font-family="monospace" font-size="12">https://secure-bank-login.phishsite.com/verify</text>
  <!-- Threat Score -->
  <rect x="80" y="200" width="300" height="180" rx="12" fill="#151525" stroke="#2a2a4a" stroke-width="1"/>
  <text x="230" y="230" fill="#aaa" font-family="monospace" font-size="13" text-anchor="middle">THREAT SCORE</text>
  <text x="230" y="310" fill="url(#danger)" font-family="monospace" font-size="72" text-anchor="middle" font-weight="bold" filter="url(#glow2)">94</text>
  <text x="230" y="340" fill="#ff4444" font-family="monospace" font-size="16" text-anchor="middle">⚠ PHISHING DETECTED</text>
  <rect x="130" y="355" width="200" height="6" rx="3" fill="#1a1a3a"/>
  <rect x="130" y="355" width="188" height="6" rx="3" fill="url(#danger)"/>
  <!-- Analysis Details -->
  <rect x="410" y="200" width="310" height="180" rx="12" fill="#151525" stroke="#2a2a4a" stroke-width="1"/>
  <text x="430" y="230" fill="#aaa" font-family="monospace" font-size="13">RISK INDICATORS</text>
  <text x="430" y="260" fill="#ff5555" font-family="monospace" font-size="12">✗ Suspicious domain pattern</text>
  <text x="430" y="285" fill="#ff5555" font-family="monospace" font-size="12">✗ SSL certificate mismatch</text>
  <text x="430" y="310" fill="#ffaa00" font-family="monospace" font-size="12">⚠ Domain age: 2 days</text>
  <text x="430" y="335" fill="#ff5555" font-family="monospace" font-size="12">✗ Known phishing keywords</text>
  <text x="430" y="360" fill="#00ff88" font-family="monospace" font-size="12">✓ ML confidence: 97.3%</text>
  <!-- Footer -->
  <rect x="80" y="400" width="640" height="40" rx="8" fill="#0a0a15" stroke="#2a2a4a" stroke-width="1"/>
  <text x="400" y="425" fill="#666" font-family="monospace" font-size="11" text-anchor="middle">FastAPI Backend  •  ML Classification  •  Real-time Domain Intelligence  •  Web Dashboard</text>
</svg>
