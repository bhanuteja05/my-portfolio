<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#00ccff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="16"/>
  <!-- Grid pattern -->
  <g opacity="0.08" stroke="#00ff88" stroke-width="0.5">
    <line x1="0" y1="50" x2="800" y2="50"/><line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/><line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="100" y1="0" x2="100" y2="500"/><line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/><line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/><line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="700" y1="0" x2="700" y2="500"/>
  </g>
  <!-- Terminal window -->
  <rect x="60" y="60" width="680" height="380" rx="12" fill="#0d0d1f" stroke="#1a1a3a" stroke-width="2"/>
  <rect x="60" y="60" width="680" height="36" rx="12" fill="#151530"/>
  <circle cx="85" cy="78" r="6" fill="#ff5f56"/><circle cx="105" cy="78" r="6" fill="#ffbd2e"/><circle cx="125" cy="78" r="6" fill="#27c93f"/>
  <text x="400" y="82" fill="#666" font-family="monospace" font-size="12" text-anchor="middle">reconforge — ~/security</text>
  <!-- Terminal content -->
  <text x="85" y="125" fill="#00ff88" font-family="monospace" font-size="14" filter="url(#glow)">$ reconforge --target example.com</text>
  <text x="85" y="155" fill="#888" font-family="monospace" font-size="13">[*] Starting Automated Reconnaissance...</text>
  <text x="85" y="180" fill="#00ccff" font-family="monospace" font-size="13">[+] Subdomain Discovery: 47 subdomains found</text>
  <text x="85" y="205" fill="#00ccff" font-family="monospace" font-size="13">[+] DNS Intelligence: 12 records analyzed</text>
  <text x="85" y="230" fill="#ffbd2e" font-family="monospace" font-size="13">[+] Port Scanning: 8 open ports detected</text>
  <text x="85" y="255" fill="#ff5f56" font-family="monospace" font-size="13">[!] Vulnerabilities: 3 HIGH, 5 MEDIUM found</text>
  <text x="85" y="280" fill="#00ccff" font-family="monospace" font-size="13">[+] API Endpoints: 23 endpoints discovered</text>
  <text x="85" y="310" fill="#888" font-family="monospace" font-size="13">[*] Generating Risk Dashboard...</text>
  <text x="85" y="340" fill="#00ff88" font-family="monospace" font-size="14" filter="url(#glow)">[✓] Attack Surface Report Ready</text>
  <!-- Title badge -->
  <rect x="85" y="370" width="200" height="40" rx="8" fill="none" stroke="url(#accent)" stroke-width="1.5"/>
  <text x="185" y="396" fill="url(#accent)" font-family="monospace" font-size="16" text-anchor="middle" font-weight="bold">RECONFORGE</text>
  <!-- Risk bar -->
  <rect x="320" y="375" width="400" height="8" rx="4" fill="#1a1a3a"/>
  <rect x="320" y="375" width="280" height="8" rx="4" fill="url(#accent)"/>
  <text x="320" y="404" fill="#666" font-family="monospace" font-size="10">Risk Score: 7.2/10 — Attack Surface Mapped</text>
</svg>
